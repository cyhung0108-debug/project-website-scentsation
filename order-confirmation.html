<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>訂單確認 - APOTHEKE</title>
    <link rel="stylesheet" href="assets/styles.css">
    <script defer src="assets/site-config.js"></script>
    <script defer src="assets/products.js"></script>
    <script defer src="assets/product-admin-store.js"></script>
    <script defer src="assets/merchant-config.js"></script>
    <script defer src="assets/firebase-config.js"></script>
    <script defer src="assets/firebase-service.js"></script>
    <script defer src="assets/app.js"></script>
    <script defer src="assets/merchant.js"></script>
  </head>
  <body data-page="order-confirmation" data-root-prefix="./" data-list-url="collections/home-fragrance/">
    <div class="announcement" data-free-shipping-announcement></div>
    <header class="site-header" aria-label="網站導覽">
      <button class="mobile-menu-button" type="button" data-open-drawer="menu" aria-label="開啟選單"><span></span><span></span></button>
      <a class="brand" href="index.html" aria-label="APOTHEKE 首頁">APOTHEKE</a>
      <nav class="desktop-nav" aria-label="主要導覽">
        <a class="nav-link" href="collections/home-fragrance/">商品</a>
        <a class="nav-link" href="about.html">關於我們</a>
        <a class="nav-link" href="contact.html">聯絡我們</a>
        <a class="nav-link" href="delivery.html">送貨方式</a>
        <a class="nav-link" href="payment.html">付款方式</a>
        <a class="nav-link" href="refund.html">退貨及退款政策</a>
      </nav>
      <div class="header-actions">
        <a class="account-link" href="#login">登入 / 註冊</a>
        <button class="icon-button search-button" type="button" data-open-search-modal aria-label="搜尋"></button>
        <button class="cart-button" type="button" data-open-drawer="cart" aria-label="開啟購物車"><span class="cart-shape"><span class="cart-count">0</span></span></button>
      </div>
    </header>
    <main data-order-confirmation-page></main>
    <div class="drawer-backdrop" data-close-drawer></div>
    <aside class="drawer" id="cart-drawer" aria-hidden="true" aria-label="購物車">
      <button class="drawer-close" type="button" data-close-drawer aria-label="關閉購物車">x</button>
      <h2>購物車共 <span class="cart-total-quantity">0</span> 件商品</h2>
      <p class="shipping-progress"></p>
      <div class="cart-items" data-cart-items><p class="empty-cart">購物車暫時沒有商品</p></div>
      <div class="cart-summary">
        <p><span>商品數量</span><strong><span class="cart-total-quantity">0</span> 件</strong></p>
        <p><span>商品總額</span><strong class="cart-total-amount"></strong></p>
      </div>
      <button class="checkout-button" type="button" data-go-checkout>前往結帳</button>
      <button class="clear-cart-button" type="button" data-cart-action="clear">清空購物車</button>
    </aside>
    <aside class="drawer" id="menu-drawer" aria-hidden="true" aria-label="選單">
      <button class="drawer-close" type="button" data-close-drawer aria-label="關閉選單">x</button>
      <h2>選單</h2>
      <a href="collections/home-fragrance/">商品</a>
      <a href="about.html">關於我們</a>
      <a href="contact.html">聯絡我們</a>
      <a href="delivery.html">送貨方式</a>
      <a href="payment.html">付款方式</a>
      <a href="refund.html">退貨及退款政策</a>
    </aside>
    <div class="toast" role="status" aria-live="polite"></div>
  </body>
</html>
